name: Rebuild site from CSV

on:
  push:
    paths:
      - 'data/use_cases.csv'   # triggered when Power Automate updates this file
  workflow_dispatch:            # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to push the rebuilt index.html back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jinja2

      - name: Generate index.html
        run: python scripts/generate.py

      - name: Commit rebuilt index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-rebuild: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
